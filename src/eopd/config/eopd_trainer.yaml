# EOPD (Entropy-Aware On-Policy Distillation) Trainer config
#
# Combines PPO-style clipped reverse KL (at all positions) with forward KL
# over the teacher's top-k tokens (at high-entropy positions only).
#
# Reference: "Entropy-Aware On-Policy Distillation of Language Models"
#            Jin et al., 2026 (arxiv.org/abs/2603.07079)
#
# Usage:
#   python -m eopd.main_eopd \
#     --config-path ./config --config-name eopd_trainer \
#     actor_rollout_ref.model.path=/path/to/model \
#     data.train_files=/path/to/train.parquet \
#     data.val_files="['/path/to/val1.parquet','/path/to/val2.parquet']"

hydra:
  searchpath:
    - pkg://verl.trainer.config

defaults:
  - actor@actor_rollout_ref.actor: dp_actor
  - data@data: legacy_data
  - ref@actor_rollout_ref.ref: dp_ref
  - rollout@actor_rollout_ref.rollout: rollout
  - model@actor_rollout_ref.model: hf_model
  - critic@critic: dp_critic
  - legacy_reward_impl
  - reward@reward: reward
  - _self_

data:
  return_raw_chat: true

# ---------- Actor + Rollout + Ref ----------
actor_rollout_ref:
  hybrid_engine: true
  nccl_timeout: 600

  rollout:
    name: sglang
    mode: async
    free_cache_engine: false
    temperature: 1.0
    top_p: 1.0
    # EOPD uses single rollout per prompt (not 8 like GRPO)
    n: 1

    val_kwargs:
      n: 1
      do_sample: true
      # Paper eval: temperature=1.0, top_p=0.8 (Appendix C)
      temperature: 1.0
      top_p: 0.8
      top_k: 20

  ref:
    fsdp_config:
      param_offload: true

# ---------- Algorithm (required for schema) ----------
algorithm:
  _target_: verl.trainer.config.AlgoConfig
  gamma: 1.0
  lam: 1.0
  adv_estimator: grpo
  norm_adv_by_std_in_grpo: true
  use_kl_in_reward: false
  kl_penalty: kl
  kl_ctrl:
    _target_: verl.trainer.config.KLControlConfig
    type: fixed
    kl_coef: 0.001
    horizon: 10000
    target_kl: 0.1
  use_pf_ppo: false
  pf_ppo:
    reweight_method: pow
    weight_pow: 2.0

# ---------- EOPD specific ----------
eopd:
  # PPO clip epsilon for importance-sampled reverse KL (Eq. 8)
  clip_epsilon: 0.2

  # Entropy threshold tau: positions with teacher entropy > tau get FKL term (Eq. 9)
  # Paper default: 0.8 (Table 5 shows stable performance from 0.6-1.0)
  entropy_threshold: 0.8

  # Top-k tokens for forward KL approximation (Eq. 10)
  # k=16 retains most probability mass with minimal memory overhead (Appendix F)
  topk: 16

  # Number of PPO epochs per rollout batch
  # Paper: batch_size=128, mini_batch_size=32 -> 4 gradient steps
  n_ppo_epochs: 4

  # Chunk size for memory-efficient loss computation
  chunk_size: 512

  # Max sequence length for EOPD training (prompt + response)
  max_length: 16384

  # Optional system prompt for teacher
  teacher_system_prompt: null

# ---------- Reward (validation only, no RM) ----------
reward:
  reward_model:
    enable: false

# ---------- Trainer ----------
trainer:
  balance_batch: false
  total_epochs: 15
  total_training_steps: null
  project_name: eopd
  experiment_name: eopd_training
  logger: ["console", "mlflow"]
  log_val_generations: 10
  nnodes: 1
  n_gpus_per_node: 8
  save_freq: 20
  test_freq: 5
  esi_redundant_time: 0
  resume_mode: disable
  resume_from_path: null
  val_before_train: true
  val_only: false
  critic_warmup: 0
  default_hdfs_dir: null
  del_local_ckpt_after_load: false
  default_local_dir: checkpoints/${trainer.project_name}/${trainer.experiment_name}
  max_actor_ckpt_to_keep: null
  max_critic_ckpt_to_keep: null
  ray_wait_register_center_timeout: 300
  device: cuda
  use_legacy_worker_impl: auto

# ---------- Profiler ----------
global_profiler:
  _target_: verl.utils.profiler.ProfilerConfig
  tool: null
  steps: null
  profile_continuous_steps: false
  save_path: "outputs/profile"
  global_tool_config:
    nsys:
      _target_: verl.utils.profiler.config.NsightToolConfig
      discrete: false
      controller_nsight_options:
        trace: "cuda,nvtx,cublas,ucx"
        cuda-memory-usage: "true"
        cuda-graph-trace: "graph"
      worker_nsight_options:
        trace: "cuda,nvtx,cublas,ucx"
        cuda-memory-usage: "true"
        cuda-graph-trace: "graph"
        capture-range: "cudaProfilerApi"
        capture-range-end: null
        kill: none
    torch_memory:
      trace_alloc_max_entries: 100000
      stack_depth: 32
      context: "all"
      stacks: "all"
      kw_args: {}

# ---------- TransferQueue ----------
transfer_queue:
  enable: false

# ---------- Ray ----------
ray_kwargs:
  ray_init:
    num_cpus: null
  timeline_json_file: null
